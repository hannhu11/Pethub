map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

resolver 127.0.0.11 valid=30s ipv6=off;

server {
  listen 80;
  server_name pethubvn.store www.pethubvn.store;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  return 301 https://pethubvn.store$request_uri;
}

server {
  listen 443 ssl http2;
  server_name pethubvn.store;

  ssl_certificate /etc/letsencrypt/live/pethubvn.store/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pethubvn.store/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  location /api/ {
    set $api_upstream http://pethub-api:4000;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /socket.io/ {
    set $api_upstream http://pethub-api:4000;
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    set $web_upstream http://pethub-web:80;
    proxy_pass $web_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name www.pethubvn.store;

  ssl_certificate /etc/letsencrypt/live/pethubvn.store/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pethubvn.store/privkey.pem;

  return 301 https://pethubvn.store$request_uri;
}
